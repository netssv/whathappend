<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatHappened Terminal</title>

    <!-- xterm.js v5 local bundle (UMD — must be classic scripts) -->
    <link rel="stylesheet" href="lib/xterm.min.css" />
    <script src="lib/xterm.min.js"></script>
    <script src="lib/addon-fit.min.js"></script>
    <script src="lib/addon-web-links.min.js"></script>

    <!-- Custom theme -->
    <link rel="stylesheet" href="styles.css" />
</head>

<body style="display:flex;flex-direction:column;height:100%;">
    <!-- Active tab context display with logo -->
    <div id="context-bar">
        <div class="context-row context-top">
            <img id="context-logo" src="icons/icon.svg" alt="WH" width="16" height="16" />
            <input id="context-domain" type="text" value="No active target" readonly spellcheck="false" autocomplete="off" />
            <div id="font-controls">
                <button id="font-decrease" title="Decrease font size (min 10px)">−</button>
                <button id="font-increase" title="Increase font size (max 20px)">+</button>
            </div>
            <span id="context-version">v2.3.2</span>
        </div>
        <div id="context-triad">
            <div class="triad-col" title="Domain Registrar">
                <span class="triad-label">REG</span>
                <span id="context-registrar" class="triad-value"></span>
            </div>
            <div class="triad-col" title="Nameserver Provider">
                <span class="triad-label">NS</span>
                <span id="context-ns" class="triad-value"></span>
            </div>
            <div class="triad-col" title="Web Hosting Provider">
                <span class="triad-label">HOST</span>
                <span id="context-host" class="triad-value"></span>
            </div>
        </div>
    </div>

    <!-- Tab-switch notification bar -->
    <div id="tab-switch-bar">
        <span id="tab-switch-icon">↗</span>
        <span id="tab-switch-label">Tab changed →</span>
        <span id="tab-switch-domain"></span>
        <button id="tab-switch-btn" title="Switch target to this domain">Switch</button>
        <button id="tab-switch-dismiss" title="Keep current target">✕</button>
    </div>

    <div id="terminal-container"></div>

    <!-- Application entry point (ES Module) -->
    <script type="module" src="terminal-main.js"></script>
</body>

</html>
